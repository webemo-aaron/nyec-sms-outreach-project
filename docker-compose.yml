services:
  local-api:
    image: nyec_sms_outreach_project-local-api:latest
    build:
      context: ./local-api
    container_name: nyec-sms-outreach-local-api
    ports:
      - "3001:3001"
    volumes:
      - local_api_data:/app/data
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3001
      - HOST=0.0.0.0
      - DATA_FILE=/app/data/state.json
      - TWILIO_MODE=${TWILIO_MODE:-TEST}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_FROM_NUMBER=${TWILIO_FROM_NUMBER:-}
      - TWILIO_CALLBACK_BASE_URL=${TWILIO_CALLBACK_BASE_URL:-http://localhost:3001}
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:3001/health"]
      interval: 10s
      timeout: 3s
      retries: 10

  iris:
    build: ./iris
    container_name: nyec-sms-outreach-iris
    ports:
      - "52773:52773"
      - "1972:1972"
    volumes:
      - ./iris/src:/opt/irisbuild/src
      - ./iris/tests:/opt/irisbuild/tests
    environment:
      - IRIS_USERNAME=SuperUser
      - IRIS_PASSWORD=SYS

  vue-ui:
    image: nyec_sms_outreach_project-vue-ui:latest
    build:
      context: ./vue-ui
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3001/api/nyec}
    container_name: nyec-sms-outreach-ui
    ports:
      - "5173:80"
    depends_on:
      local-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  local_api_data:
